{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Profile | HarvestHub</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'user/userprofile.css' %}" />
  </head>
  <body>
    <header>
      <div class="logo">
        <h1>Harvest<span>Hub</span></h1>
      </div>
      <button class="mobile-menu-btn">
        <i class="fas fa-bars"></i>
      </button>
      <nav>
        <ul>
          <li>
            <a href="{% url 'userhome' %}"
              ><i class="fas fa-home"></i> <span>Home</span></a
            >
          </li>
          <li>
            <a href="{% url 'userproducts' %}"
              ><i class="fas fa-shopping-basket"></i> <span>Products</span></a
            >
          </li>
          <li>
            <a href="{% url 'userorders' %}"
              ><i class="fas fa-history"></i> <span>Orders</span></a
            >
          </li>
          <li class="active">
            <a href="{% url 'userprofile' %}"
              ><i class="fas fa-user"></i> <span>Profile</span></a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="profile-section">
        <div class="profile-header slide-up">
          <div class="profile-avatar">
            <img src="" alt="Profile Avatar" class="pulse" />
          </div>
          <h2>{{ myname }}</h2>
          <p class="rating">
            <span class="stars">★★★★☆</span> 4.3 (12 reviews)
          </p>
        </div>

     
          

        <div class="profile-details pop-in">
          <h3 class="slide-in-left">Personal Information</h3>
          <div class="detail-group">
            <label>Full Name</label>
            <p>{{ myname }}</p>
          </div>
          <div class="detail-group">
            <label>Email</label>
            <p>{{ email }}</p>
          </div>
          <div class="detail-group">
            <label>Phone</label>
            <p>+91 {{ phone }}</p>
          </div>
          <div class="detail-group">
            <label>Address</label>
            <p>{{ address }}</p>
          </div>
          <div class="detail-group">
            <label>Date</label>
            <p>{{ date }}</p>
          </div>
        </div>

        <div class="profile-actions">
          <a href="{% url 'edituserprofile' %}" class="action-btn fade-in">
            <i class="fas fa-edit"></i>
            <span>Edit Profile</span>
          </a>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-nav">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="products.html"><i class="fas fa-shopping-basket"></i></a>
        <a href="orders.html"><i class="fas fa-history"></i></a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i></a>
      </div>
      <p>&copy; 2023 FreshHarvest. All rights reserved.</p>
    </footer>

    <script>
      // Mobile menu toggle
      document
        .querySelector(".mobile-menu-btn")
        .addEventListener("click", function () {
          document.querySelector("nav").classList.toggle("active");
        });
    </script>
  </body>
</html>
